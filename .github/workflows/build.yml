name: Build Auto Playlist Maker

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: |
          pyinstaller `
            --name AutoPlaylistMaker `
            --onefile `
            --windowed `
            --collect-all moviepy `
            --collect-all imageio_ffmpeg `
            --collect-all imageio `
            --hidden-import tkinterdnd2 `
            --hidden-import pydub `
            --hidden-import scipy `
            --hidden-import scipy.ndimage `
            --hidden-import librosa `
            --hidden-import numpy `
            --hidden-import PIL `
            --add-data "visual_config.json;." `
            app.py `
            --noconfirm

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoPlaylistMaker-Windows
          path: dist/AutoPlaylistMaker.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt
          pip3 install pyinstaller

      - name: Build executable
        run: |
          pyinstaller \
            --name AutoPlaylistMaker \
            --onefile \
            --windowed \
            --collect-all moviepy \
            --collect-all imageio_ffmpeg \
            --collect-all imageio \
            --hidden-import tkinterdnd2 \
            --hidden-import pydub \
            --hidden-import scipy \
            --hidden-import scipy.ndimage \
            --hidden-import librosa \
            --hidden-import numpy \
            --hidden-import PIL \
            --add-data "visual_config.json:." \
            app.py \
            --noconfirm

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoPlaylistMaker-macOS
          path: dist/AutoPlaylistMaker

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Auto Playlist Maker v${{ github.ref_name }}"
          body: |
            ## Auto Playlist Maker v${{ github.ref_name }}

            ### Windows (.exe) + macOS 바이너리 포함

            ---

            ### 기능

            - **음악 분석**: BPM, 키, 캠롯 심벌, 코드 자동 감지
            - **스마트 트랙 분배 알고리즘**: 목표 시간에 맞춰 곡을 여러 영상으로 자동 분할
            - **수동 분배**: 드래그로 곡을 그룹에 배치하고 순서 변경
            - **크로스fade 엔진**: 곡 간 부드러운 전환 (WAV 출력)
            - **영상 생성**: 5가지 비주얼라이저 모드 (EQ 바, 파형, 스펙트럼, 서클, 래디얼)
            - **GPU 인코딩 지원**: NVENC (NVIDIA), VideoToolbox (Mac), VAAPI (Intel)
            - **tkinter GUI**: 다크/라이트 테마 토글
            - **트림 편집 모달**: MM:SS:ms 정밀 시간 입력
            - **클립 목록**: 이미지/영상 전환 설정, 간격/랜덤 옵션
            - **커스텀 텍스트**: 폰트, 크기, 색상, 위치 자유 설정
            - **비트 이펙트**: 바운스, 쉐이크, 줌, 플래시 + CRT 효과
            - **프로젝트 저장/로드**: 분석 결과, 분배, 클립 설정 전체 저장
            - **미리보기**: 실시간 스크러버 미리보기 + 렌더링 재생

            ---

            ### 설치 방법

            - **Windows**: `setup.bat` 실행 → ffmpeg 자동 설치 → `.exe` 실행
            - **macOS**: `setup_mac.sh` 실행 → ffmpeg 자동 설치 → 바이너리 실행
          files: |
            AutoPlaylistMaker-Windows/AutoPlaylistMaker.exe
            AutoPlaylistMaker-macOS/AutoPlaylistMaker
            setup.bat
            setup_mac.sh
          draft: false
          prerelease: false
